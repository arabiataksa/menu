<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SEO ===== -->
  <title>Today's Best Offers | Arabiata</title>
  <meta name="description" content="Browse today's hottest restaurant deals. Tap any offer to grab it instantly — fresh discounts updated daily." />
  <link rel="canonical" href="https://example.com/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Today's Best Offers | Restaurant Offers" />
  <meta property="og:description" content="Browse today's hottest restaurant deals. Tap any offer to grab it instantly." />
  <meta property="og:image" content="logo-1.png" />
  <meta property="og:url" content="https://example.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo-1.png" />

  <!-- Fonts: a characterful display face + a clean utility body face -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HERO SECTION ===== -->
  <header class="hero">
    <div class="hero__glow" aria-hidden="true"></div>

    <div class="hero__inner">
      <img class="hero__logo" src="logo-62139c6a0b0d6.png" alt="Restaurant Offers logo"  height="90" />

      <h1 class="hero__title">
        <span class="hero__title-emoji" aria-hidden="true">🔥</span>
        Today's Best Offers
      </h1>
      <p class="hero__subtitle">Choose your favorite offer and enjoy the best deals.</p>
    </div>
  </header>

  <!-- ===== OFFERS SECTION ===== -->
  <main>
    <section class="offers" aria-label="Current offers">
      <!-- Loading state, shown while offers.json is being fetched -->
      <div id="offers-status" class="offers__status" role="status"></div>

      <!-- Offer cards are injected here by script.js -->
      <div id="offers-grid" class="offers__grid"></div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>&copy; 2026 ArabiataKSA</p>
  </footer>

  <!-- ===== LIGHTBOX ===== -->
  <!-- Fullscreen image viewer, hidden by default and populated/controlled by script.js -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" aria-hidden="true">
    <div class="lightbox__backdrop" data-lightbox-close></div>

    <button type="button" class="lightbox__close" data-lightbox-close aria-label="Close viewer">&times;</button>

    <button type="button" class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Previous image">&#10094;</button>
    <button type="button" class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Next image">&#10095;</button>

    <div class="lightbox__stage" id="lightbox-stage">
      <img id="lightbox-image" class="lightbox__image" src="" alt="Offer preview" draggable="false" />
    </div>

    <div class="lightbox__zoom-controls">
      <button type="button" class="lightbox__zoom-btn" id="lightbox-zoom-out" aria-label="Zoom out">&minus;</button>
      <button type="button" class="lightbox__zoom-btn" id="lightbox-zoom-in" aria-label="Zoom in">&plus;</button>
    </div>

    <div class="lightbox__counter" id="lightbox-counter" aria-live="polite">1 / 1</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
